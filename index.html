<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>F.J.O.D | Smart Record System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── 全域基礎 ── */
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --neon-yellow: #FFD600;
      --neon-red:    #FF3B3B;
      --deep-blue:   #050D1A;
      --glass-bg:    rgba(10, 30, 70, 0.45);
      --glass-border:rgba(100, 160, 255, 0.18);
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--deep-blue);
      color: #E8F0FF;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 星空背景 ── */
    .starfield {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 50% 10%, rgba(30, 80, 200, 0.2) 0%, transparent 80%);
    }

    /* ── 毛玻璃容器 ── */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
    }

    /* ── 核心：強迫手機端也要左右排列 ── */
    .main-layout {
      display: flex !important;
      flex-direction: row !important;
      gap: 8px;
    }

    .timer-display {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(16px, 4.2vw, 32px);
      letter-spacing: 1px;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(100,160,255,0.6);
    }

    .count-badge {
      font-family: 'Orbitron', monospace;
      background: rgba(255, 214, 0, 0.15);
      color: var(--neon-yellow);
      border: 1px solid rgba(255, 214, 0, 0.3);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
    }

    /* ── 手機端尺寸優化 ── */
    @media (max-width: 600px) {
      .btn-record { padding: 10px 5px; font-size: 11px; }
      .record-list { max-height: 220px; }
      .px-4 { padding-left: 0.4rem; padding-right: 0.4rem; }
      .panel-padding { padding: 0.75rem; }
    }

    .btn-record {
      cursor: pointer;
      border-radius: 8px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      transition: transform 0.1s;
      background: linear-gradient(135deg, #1565C0, #0D47A1);
      color: #FFD600;
    }
    .btn-record:active { transform: scale(0.95); }

    .btn-landing {
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      color: #FF6B6B;
      background: rgba(255, 59, 59, 0.1);
      border: 1px solid rgba(255, 59, 59, 0.3);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .record-item { background: rgba(10, 30, 80, 0.5); border-radius: 6px; padding: 6px; margin-bottom: 4px; }
  </style>
</head>
<body>

<div class="starfield"></div>

<div class="relative z-10 min-h-screen flex flex-col px-4 py-4">

  <header class="flex items-center justify-between mb-4">
    <div>
      <div class="font-orbitron font-black text-xl text-white tracking-widest">F.J.O.D</div>
      <div class="text-[10px] text-blue-400 tracking-widest opacity-70">SMART RECORD SYSTEM</div>
    </div>
    <div class="font-orbitron text-[10px] text-blue-300 opacity-50" id="liveClock">--:--:--</div>
  </header>

  <main class="flex-1 main-layout">

    <section class="glass flex-1 panel-padding p-3 flex flex-col gap-3">
      <div class="flex items-center gap-2">
        <span class="text-lg">💧</span>
        <div class="font-orbitron font-bold text-xs text-white">WATER LOG</div>
      </div>
      <div class="bg-black/30 rounded-lg p-2 text-center">
        <div class="text-[9px] text-yellow-400 font-orbitron mb-1">ELAPSED</div>
        <div class="timer-display" id="elapsed-water">--:--:--</div>
      </div>
      <button class="btn-record w-full py-3 text-xs" onclick="addRecord('water')">⚡ 記錄</button>
      
      <div class="flex justify-between items-center px-1">
        <span id="total-count-water" class="count-badge">LOGS: 0</span>
        <button class="btn-landing" onclick="clearRecords('water')">🛬 安全降落</button>
      </div>
      <div class="record-list overflow-y-auto text-[10px]" id="list-water"></div>
    </section>

    <section class="glass flex-1 panel-padding p-3 flex flex-col gap-3">
      <div class="flex items-center gap-2">
        <span class="text-lg">🥮</span>
        <div class="font-orbitron font-bold text-xs text-white">MOONCAKE LOG</div>
      </div>
      <div class="bg-black/30 rounded-lg p-2 text-center">
        <div class="text-[9px] text-yellow-400 font-orbitron mb-1">ELAPSED</div>
        <div class="timer-display" id="elapsed-cake">--:--:--</div>
      </div>
      <button class="btn-record w-full py-3 text-xs" onclick="addRecord('cake')">⚡ 記錄</button>

      <div class="flex justify-between items-center px-1">
        <span id="total-count-cake" class="count-badge">LOGS: 0</span>
        <button class="btn-landing" onclick="clearRecords('cake')">🛬 安全降落</button>
      </div>
      <div class="record-list overflow-y-auto text-[10px]" id="list-cake"></div>
    </section>

  </main>
</div>

<script>
  const ONE_HOUR_MS = 3600000;
  const STORAGE_KEY = { water: 'fjod_water', cake: 'fjod_cake' };
  
  const records = { 
    water: JSON.parse(localStorage.getItem(STORAGE_KEY.water) || '[]'), 
    cake: JSON.parse(localStorage.getItem(STORAGE_KEY.cake) || '[]') 
  };

  function addRecord(type) {
    const now = Date.now();
    const isAlert = records[type].length > 0 && (now - records[type][0].ts) < ONE_HOUR_MS;
    records[type].unshift({ ts: now, alert: isAlert });
    saveToStorage(type);
    renderList(type);
  }

  function clearRecords(type) {
    const label = type === 'water' ? 'WATER' : 'MOONCAKE';
    if (!confirm(`確認執行 [${label}] 安全降落？所有任務紀錄將歸零。`)) return;
    records[type] = [];
    saveToStorage(type);
    renderList(type);
  }

  function saveToStorage(type) {
    localStorage.setItem(STORAGE_KEY[type], JSON.stringify(records[type]));
  }

  function renderList(type) {
    // 更新累積總次數標籤（不受日期限制，僅在安全降落後歸零）
    document.getElementById(`total-count-${type}`).textContent = `LOGS: ${records[type].length}`;
    
    const container = document.getElementById(`list-${type}`);
    if (records[type].length === 0) {
      container.innerHTML = '<div class="text-center opacity-30 py-4 text-[9px]">NO MISSION DATA</div>';
      return;
    }

    container.innerHTML = records[type].slice(0, 15).map(rec => `
      <div class="record-item ${rec.alert ? 'border border-red-500/50 bg-red-900/20' : ''}">
        <div class="flex justify-between items-center">
          <span class="${rec.alert ? 'text-red-300' : 'text-blue-200'}">${new Date(rec.ts).toLocaleTimeString('zh-TW', {hour12:false})}</span>
          <span class="opacity-40 font-orbitron" style="font-size:8px;">${new Date(rec.ts).toLocaleDateString('zh-TW', {month:'2-digit', day:'2-digit'})}</span>
        </div>
      </div>
    `).join('');
  }

  function update() {
    const now = Date.now();
    ['water', 'cake'].forEach(type => {
      const display = document.getElementById(`elapsed-water`); // 注意：此處修正 ID 抓取
      const currentDisplay = document.getElementById(`elapsed-${type}`);
      if (records[type].length > 0) {
        const diff = now - records[type][0].ts;
        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        currentDisplay.textContent = `${h}:${m}:${s}`;
        currentDisplay.style.color = diff >= ONE_HOUR_MS ? '#FFD600' : '#FFF';
      } else {
        currentDisplay.textContent = '--:--:--';
      }
    });
    document.getElementById('liveClock').textContent = new Date().toLocaleTimeString('zh-TW', {hour12:false});
  }

  setInterval(update, 1000);
  renderList('water'); renderList('cake');
</script>
</body>
</html>
